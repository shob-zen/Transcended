    <div class="progress-container">
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <div id="page-counter">DATA_SCAN: PAGE 1 / 19</div>
    </div>

    <script>
        const fill = document.getElementById('progress-fill');
        const counter = document.getElementById('page-counter');
        const pages = document.querySelectorAll('.manga-page');
        const totalPages = pages.length;

        window.addEventListener('scroll', () => {
            let current = 1;
            const screenMid = window.innerHeight / 2;

            pages.forEach((page, index) => {
                const rect = page.getBoundingClientRect();
                // Detection for which page is currently in the middle of the viewport
                if (rect.top < screenMid && rect.bottom > screenMid) {
                    current = index + 1;
                }
            });

            // Update Progress HUD
            counter.innerText = `DATA_SCAN: PAGE ${current} / ${totalPages}`;
            const percentage = (current / totalPages) * 100;
            fill.style.width = percentage + "%";
        });
    </script>

</body>
