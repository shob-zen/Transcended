<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcended | Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vignette"></div>
    <header><span class="logo">TRANSCENDED</span></header>

    <main>
        <section class="hero">
            <h1>TRANSCENDED</h1>
            <p class="description">The moment a being stops belonging to a planet and starts belonging to the universe.</p>
        </section>

        <section class="content-section">
            <h2 class="label">Volume 1</h2>
            
            <a href="grounded.html" class="card">
                <span class="material-symbols-outlined icon">public</span> 
                <div class="info">
                    <span class="num">CHAPTER 1</span>
                    <span class="title">Grounded</span>
                </div>
                <span class="material-symbols-outlined arrow">arrow_forward</span>
            </a>

            <div class="card locked">
                <span class="material-symbols-outlined icon"></span> 
                <div class="info">
                    <span class="num">CHAPTER 2</span>
                    <span class="title">Fracture <span style="font-size: 0.7rem; opacity: 0.4;">(Coming Soon...)</span></span>
                </div>
                <span class="status">LOCKED</span>
            </div>
        </section>

        <section class="content-section">
            <h2 class="label">Archive Access</h2>
            <a href="characters.html" class="card">
                <span class="material-symbols-outlined icon">fingerprint</span> 
                <div class="info"><span class="num">DATABASE</span><span class="title">Entity Profiles</span></div>
                <span class="material-symbols-outlined arrow">arrow_forward</span>
            </a>
        </section>
    </main>
</body>
</html>
